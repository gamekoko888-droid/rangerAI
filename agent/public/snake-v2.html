<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>贪吃蛇 🐍</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f; color:#fff;
  font-family:'Segoe UI',sans-serif;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; overflow:hidden;
  user-select:none; -webkit-user-select:none;
}
h1 {
  font-size:1.4rem; margin:10px 0 4px;
  background:linear-gradient(90deg,#00ff88,#00ccff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
#info-bar { display:flex; gap:20px; margin-bottom:4px; font-size:0.85rem; color:#aaa; }
#info-bar span { color:#fff; font-weight:bold; }
#level-bar-wrap {
  width:min(90vw,400px); height:5px; background:#1a1a2e;
  border-radius:3px; margin-bottom:4px; overflow:hidden;
}
#level-bar { height:100%; width:0%; background:linear-gradient(90deg,#00ff88,#ffcc00); transition:width 0.3s; border-radius:3px; }
#diff-tag {
  font-size:0.75rem; padding:2px 10px; border-radius:20px;
  background:#1a1a2e; border:1px solid #2a4a7f; color:#88ccff; margin-bottom:4px;
}
#canvas-wrap {
  position:relative; border:2px solid #1e3a5f; border-radius:10px;
  overflow:hidden; box-shadow:0 0 30px rgba(0,200,255,0.15);
}
canvas { display:block; touch-action:none; }
#overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.85);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; border-radius:8px;
}
#overlay h2 {
  font-size:1.8rem;
  background:linear-gradient(90deg,#00ff88,#00ccff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#overlay p { color:#ccc; font-size:0.88rem; text-align:center; padding:0 16px; }
.score-big { font-size:2.4rem; font-weight:bold; color:#ffcc00; }
#btn-start {
  padding:14px 40px; font-size:1.1rem;
  background:linear-gradient(135deg,#00ff88,#00ccff);
  color:#000; border:none; border-radius:30px;
  cursor:pointer; font-weight:bold; letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
#dpad {
  display:grid; grid-template-columns:repeat(3,56px);
  grid-template-rows:repeat(3,56px); gap:4px; margin-top:8px;
}
.dkey {
  width:56px; height:56px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15); border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.dkey:active { background:rgba(0,255,136,0.25); }
.dkey.empty { visibility:hidden; }
@keyframes fadeUp {
  0%{opacity:1;transform:translate(-50%,-50%)}
  100%{opacity:0;transform:translate(-50%,-130%)}
}
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<div id="info-bar">
  <div>得分 <span id="sc">0</span></div>
  <div>最高 <span id="best">0</span></div>
  <div>关卡 <span id="lv">1</span></div>
</div>
<div id="level-bar-wrap"><div id="level-bar"></div></div>
<div id="diff-tag">简单</div>

<div id="canvas-wrap">
  <canvas id="cvs"></canvas>
  <div id="overlay">
    <h2>🐍 贪吃蛇</h2>
    <p>吃食物得分，速度随关卡增加<br>📱 滑动屏幕或使用方向键控制</p>
    <button id="btn-start">开始游戏</button>
  </div>
</div>

<div id="dpad">
  <div class="dkey empty"></div>
  <div class="dkey" id="d-up">▲</div>
  <div class="dkey empty"></div>
  <div class="dkey" id="d-left">◀</div>
  <div class="dkey" id="d-down">▼</div>
  <div class="dkey" id="d-right">▶</div>
  <div class="dkey empty"></div>
  <div class="dkey empty"></div>
  <div class="dkey empty"></div>
</div>

<script>
(function(){
  const COLS=20, ROWS=20;
  const cvs=document.getElementById('cvs');
  const ctx=cvs.getContext('2d');
  const overlay=document.getElementById('overlay');
  const scEl=document.getElementById('sc');
  const bestEl=document.getElementById('best');
  const lvEl=document.getElementById('lv');
  const lvBar=document.getElementById('level-bar');
  const diffTag=document.getElementById('diff-tag');

  let CELL=20;
  function resize(){
    const maxW=Math.min(window.innerWidth*0.96,420);
    const maxH=window.innerHeight-220;
    const sz=Math.floor(Math.min(maxW,maxH)/COLS)*COLS;
    CELL=sz/COLS;
    cvs.width=sz; cvs.height=sz;
  }
  resize();

  // 游戏状态
  let snake,dir,nextDir,food,bonus,score,level,eatCount,loopId,running;
  let best=parseInt(localStorage.getItem('snk_best')||'0');
  bestEl.textContent=best;

  const DIFF_NAMES=['简单','普通','较快','快速','极速','疯狂'];
  const DIFF_COLS=['#00ff88','#88ff00','#ffcc00','#ff8800','#ff4444','#ff00ff'];
  function speed(lv){ return Math.max(80,220-(lv-1)*22); }
  function foodNeed(lv){ return 5+lv; }

  function randCell(exc){
    let p;
    do{ p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    while(exc.some(s=>s.x===p.x&&s.y===p.y));
    return p;
  }

  function initGame(){
    const m=Math.floor(COLS/2);
    snake=[{x:m,y:m},{x:m-1,y:m},{x:m-2,y:m}];
    dir={x:1,y:0}; nextDir={x:1,y:0};
    score=0; level=1; eatCount=0; bonus=null; running=true;
    food=randCell(snake);
  }

  function updateHUD(){
    scEl.textContent=score; lvEl.textContent=level;
    lvBar.style.width=Math.min(eatCount/foodNeed(level)*100,100)+'%';
    const di=Math.min(level-1,5);
    diffTag.textContent=DIFF_NAMES[di];
    diffTag.style.color=DIFF_COLS[di];
    diffTag.style.borderColor=DIFF_COLS[di]+'55';
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function draw(){
    // 背景
    for(let r=0;r<ROWS;r++)
      for(let c=0;c<COLS;c++){
        ctx.fillStyle=(r+c)%2===0?'#0d1117':'#101520';
        ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
      }
    if(!snake) return;

    // 食物
    ctx.font=`${CELL*0.6}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🍎',(food.x+0.5)*CELL,(food.y+0.5)*CELL+1);

    // 奖励食物
    if(bonus){
      const p=1+Math.sin(Date.now()/150)*0.1;
      ctx.save();
      const cx=(bonus.x+0.5)*CELL, cy=(bonus.y+0.5)*CELL;
      ctx.translate(cx,cy); ctx.scale(p,p); ctx.translate(-cx,-cy);
      ctx.fillText(bonus.type==='star'?'⭐':'💎',cx,cy+1);
      ctx.restore();
      ctx.beginPath();
      ctx.arc(cx,cy,CELL*0.45,-Math.PI/2,-Math.PI/2+(bonus.timer/80)*Math.PI*2);
      ctx.strokeStyle=bonus.type==='star'?'#ffcc00aa':'#cc44ffaa';
      ctx.lineWidth=2; ctx.stroke();
    }

    // 蛇
    snake.forEach((seg,i)=>{
      if(i===0){
        const g=ctx.createRadialGradient(
          (seg.x+0.5)*CELL,(seg.y+0.5)*CELL,0,
          (seg.x+0.5)*CELL,(seg.y+0.5)*CELL,CELL*0.6
        );
        g.addColorStop(0,'#00ffaa'); g.addColorStop(1,'#00aa66');
        ctx.fillStyle=g;
        roundRect(seg.x*CELL+1,seg.y*CELL+1,CELL-2,CELL-2,5); ctx.fill();
        // 眼睛
        const ey=CELL*0.22;
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.arc((seg.x+0.5)*CELL+(-dir.y)*ey+dir.x*ey,(seg.y+0.5)*CELL+(-dir.x)*ey+dir.y*ey,CELL*0.1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc((seg.x+0.5)*CELL+dir.y*ey+dir.x*ey,(seg.y+0.5)*CELL+dir.x*ey+dir.y*ey,CELL*0.1,0,Math.PI*2); ctx.fill();
      } else {
        const ratio=1-i/snake.length*0.5;
        const g=Math.floor(ratio*160+60);
        ctx.fillStyle=`rgb(0,${g},${Math.floor(g*0.6)})`;
        roundRect(seg.x*CELL+2,seg.y*CELL+2,CELL-4,CELL-4,4); ctx.fill();
      }
    });
  }

  function step(){
    if(!running) return;
    dir={...nextDir};
    const head={x:(snake[0].x+dir.x+COLS)%COLS, y:(snake[0].y+dir.y+ROWS)%ROWS};
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){ gameOver(); return; }
    snake.unshift(head);

    if(head.x===food.x&&head.y===food.y){
      score+=level*10; eatCount++;
      food=randCell(snake);
      if(Math.random()<0.3)
        bonus={...randCell([...snake,food]),timer:80,type:Math.random()<0.5?'star':'gem'};
      if(eatCount>=foodNeed(level)){
        level++; eatCount=0;
        clearInterval(loopId);
        loopId=setInterval(step,speed(level));
        popMsg('🎉 第 '+level+' 关！');
      }
    } else {
      snake.pop();
    }

    if(bonus&&head.x===bonus.x&&head.y===bonus.y){
      score+=level*(bonus.type==='star'?30:50); bonus=null;
    }
    if(bonus){ bonus.timer--; if(bonus.timer<=0) bonus=null; }

    if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('snk_best',best); }
    updateHUD(); draw();
  }

  function gameOver(){
    running=false; clearInterval(loopId);
    overlay.innerHTML=`
      <h2>💀 游戏结束</h2>
      <div class="score-big">${score} 分</div>
      <p>最高纪录：${best} 分 · 第 ${level} 关</p>
      <button id="btn-start" style="margin-top:8px;padding:14px 40px;font-size:1.1rem;background:linear-gradient(135deg,#00ff88,#00ccff);color:#000;border:none;border-radius:30px;cursor:pointer;font-weight:bold">再来一局</button>
    `;
    overlay.style.display='flex';
    document.getElementById('btn-start').onclick=startGame;
  }

  function startGame(){
    overlay.style.display='none';
    initGame(); updateHUD(); draw();
    clearInterval(loopId);
    loopId=setInterval(step,speed(1));
  }

  function popMsg(txt){
    const d=document.createElement('div');
    d.textContent=txt;
    d.style.cssText='position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;font-weight:bold;color:#ffcc00;pointer-events:none;text-shadow:0 0 20px #ffcc0088;animation:fadeUp 1.2s forwards;z-index:999';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1200);
  }

  function setDir(d){
    if(!running) return;
    const map={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
    const nd=map[d];
    if(nd.x+dir.x===0&&nd.y+dir.y===0) return;
    nextDir=nd;
  }

  // 键盘
  document.addEventListener('keydown',e=>{
    const m={ArrowUp:'UP',ArrowDown:'DOWN',ArrowLeft:'LEFT',ArrowRight:'RIGHT',w:'UP',s:'DOWN',a:'LEFT',d:'RIGHT'};
    if(m[e.key]){ e.preventDefault(); setDir(m[e.key]); }
  });

  // 方向键按钮
  document.getElementById('d-up').addEventListener('pointerdown',e=>{e.preventDefault();setDir('UP');});
  document.getElementById('d-down').addEventListener('pointerdown',e=>{e.preventDefault();setDir('DOWN');});
  document.getElementById('d-left').addEventListener('pointerdown',e=>{e.preventDefault();setDir('LEFT');});
  document.getElementById('d-right').addEventListener('pointerdown',e=>{e.preventDefault();setDir('RIGHT');});

  // 触摸滑动
  let ts=null;
  cvs.addEventListener('touchstart',e=>{e.preventDefault();ts=e.touches[0];},{passive:false});
  cvs.addEventListener('touchend',e=>{
    if(!ts) return; e.preventDefault();
    const dx=e.changedTouches[0].clientX-ts.clientX;
    const dy=e.changedTouches[0].clientY-ts.clientY;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    Math.abs(dx)>Math.abs(dy)?setDir(dx>0?'RIGHT':'LEFT'):setDir(dy>0?'DOWN':'UP');
    ts=null;
  },{passive:false});

  // 开始按钮
  document.getElementById('btn-start').addEventListener('click', startGame);

  // resize
  window.addEventListener('resize',()=>{ resize(); draw(); });

  // 初始画背景
  draw();
})();
</script>
</body>
</html>
