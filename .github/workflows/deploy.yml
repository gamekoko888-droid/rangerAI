# ═══════════════════════════════════════════════════════════════
# RangerAI Auto-Deploy Pipeline
# Triggers on push to main branch
# Deploys agent/ changes to /opt/rangerai-agent
# Deploys web/ changes to /opt/rangerai-web
# ═══════════════════════════════════════════════════════════════
name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - name: Detect changed paths
        id: changes
        run: |
          # Detect which directories changed
          AGENT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- agent/ | wc -l)
          WEB_CHANGED=$(git diff --name-only HEAD~1 HEAD -- web/ | wc -l)
          echo "agent_changed=$AGENT_CHANGED" >> $GITHUB_OUTPUT
          echo "web_changed=$WEB_CHANGED" >> $GITHUB_OUTPUT
          echo "Agent files changed: $AGENT_CHANGED"
          echo "Web files changed: $WEB_CHANGED"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 8.219.186.244 >> ~/.ssh/known_hosts 2>/dev/null
          # Test connection
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no admin@8.219.186.244 "echo 'SSH connection OK'"

      - name: Deploy Agent
        if: steps.changes.outputs.agent_changed != '0' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🚀 Deploying agent changes..."
          
          # Sync agent/ directory to server
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='*.bak*' \
            --exclude='data/' \
            --exclude='logs/' \
            --exclude='*.sqlite' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            agent/ admin@8.219.186.244:/opt/rangerai-agent/

          # Run syntax check + restart on server
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no admin@8.219.186.244 << 'EOF'
          set -e
          cd /opt/rangerai-agent
          
          echo "📋 Running syntax check..."
          node --check api-server.mjs
          node --check ws-realtime.mjs
          node --check worker/openclaw-handler.legacy.mjs
          echo "✅ Syntax check passed"
          
          echo "📦 Installing dependencies if needed..."
          if git diff --name-only HEAD~1 HEAD -- package.json 2>/dev/null | grep -q package.json; then
            npm install --production 2>&1 | tail -5
          fi
          
          echo "🔄 Restarting services..."
          sudo /usr/local/bin/safe-restart-rangerai
          sleep 5
          sudo /usr/local/bin/safe-restart-rangerai-ws
          sleep 5
          
          echo "🏥 Health check..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3002/api/health 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "  Retry $i/5..."
            sleep 3
          done
          echo "❌ Health check failed"
          exit 1
          EOF

      - name: Deploy Web
        if: steps.changes.outputs.web_changed != '0' || github.event_name == 'workflow_dispatch'
        run: |
          echo "🚀 Deploying web changes..."
          
          # Sync web/ directory to server
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='dist/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            web/ admin@8.219.186.244:/opt/rangerai-web/

          # Build and restart on server
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no admin@8.219.186.244 << 'EOF'
          set -e
          cd /opt/rangerai-web
          
          echo "📦 Installing dependencies..."
          pnpm install 2>&1 | tail -5
          
          echo "🔨 Building frontend..."
          pnpm build 2>&1 | tail -10
          
          echo "🔄 Restarting web service..."
          sudo systemctl restart rangerai-web
          sleep 3
          
          echo "🏥 Frontend check..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ranger.voyage/ 2>/dev/null)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Frontend accessible (200)"
          else
            echo "⚠️ Frontend returned $HTTP_CODE (may still be starting)"
          fi
          EOF

      - name: Post-deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Agent changed**: ${{ steps.changes.outputs.agent_changed }} files" >> $GITHUB_STEP_SUMMARY
          echo "- **Web changed**: ${{ steps.changes.outputs.web_changed }} files" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
